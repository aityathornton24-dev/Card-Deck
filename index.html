<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pokemon Card Deck</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main class="card-deck">

    <article class="pokemon-card">
      <div class="pokemon-image pikachu"></div>
      <div class="pokemon-content">
        <h2 class="pokemon-name">Pikachu</h2>
        <ul class="pokemon-stats">
          <li><span>HP</span><span>35</span></li>
          <li><span>Attack</span><span>55</span></li>
          <li><span>Defense</span><span>40</span></li>
          <li><span>Speed</span><span>90</span></li>
        </ul>
      </div>
    </article>

    <article class="pokemon-card">
      <div class="pokemon-image charizard"></div>
      <div class="pokemon-content">
        <h2 class="pokemon-name">Charizard</h2>
        <ul class="pokemon-stats">
          <li><span>HP</span><span>78</span></li>
          <li><span>Attack</span><span>84</span></li>
          <li><span>Defense</span><span>78</span></li>
          <li><span>Speed</span><span>100</span></li>
        </ul>
      </div>
    </article>

    <article class="pokemon-card">
      <div class="pokemon-image bulbasaur"></div>
      <div class="pokemon-content">
        <h2 class="pokemon-name">Bulbasaur</h2>
        <ul class="pokemon-stats">
          <li><span>HP</span><span>45</span></li>
          <li><span>Attack</span><span>49</span></li>
          <li><span>Defense</span><span>49</span></li>
          <li><span>Speed</span><span>45</span></li>
        </ul>
      </div>
    </article>

  </main>

</body>
</html>
